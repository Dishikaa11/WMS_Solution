name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # ✅ Step 1 — Node setup karo
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # ✅ Step 2 — Dependencies install karo
      - name: Install Dependencies
        working-directory: ./WMS-Solution/WMS-Frontend
        run: npm ci

      # ✅ Step 3 — Angular build karo manually
      - name: Build Angular App
        working-directory: ./WMS-Solution/WMS-Frontend
        run: npm run build -- --configuration production

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      # ✅ Step 4 — Deploy karo (skip_app_build: true — already build ho gaya)
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_SMOKE_0E86C6A00 }}
          action: "upload"
          app_location: "./WMS-Solution/WMS-Frontend/dist/WMS-Frontend/browser"
          api_location: ""
          output_location: ""
          skip_app_build: true        # ✅ Docker use nahi hoga ab
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
