<div class="change-password-card">

  <h2>

    Change Password

  </h2>

  <form
    [formGroup]="passwordForm"
    (ngSubmit)="onSubmit()">

    <div class="form-group">

      <label>
        Current Password
      </label>

      <input
        type="password"
        formControlName="currentPassword">

    </div>

    <div class="form-group">

      <label>
        New Password
      </label>

      <input
        type="password"
        formControlName="newPassword">

    </div>

    <button type="submit">

      Change Password

    </button>

  </form>

</div>
