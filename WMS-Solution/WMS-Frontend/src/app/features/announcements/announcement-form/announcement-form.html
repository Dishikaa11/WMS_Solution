<div class="form-wrapper">

  <button
    class="back-btn"
    (click)="goBack()">

    ← Back

  </button>

  <h2>
    Create Announcement
  </h2>

  <form
  [formGroup]="announcementForm"
  (ngSubmit)="onSubmit()">

    <div class="form-group">

      <label>Title</label>

      <input
      type="text"
      formControlName="title">

    </div>

    <div class="form-group">

      <label>Message</label>

      <textarea
      rows="6"
      formControlName="message">
      </textarea>

    </div>

    <div class="form-group">

      <label>Status</label>

      <select
      formControlName="isActive">

        <option
        [ngValue]="true">

        Active

        </option>

        <option
        [ngValue]="false">

        Inactive

        </option>

      </select>

    </div>

    <button
    type="submit"
    class="save-btn">

    Publish Announcement

    </button>

  </form>

</div>
