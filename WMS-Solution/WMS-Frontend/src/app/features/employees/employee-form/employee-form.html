<div class="form-container">

    <div class="top-bar">

  <button
    class="back-btn"
    (click)="goBack()">

    ← Back

  </button>

</div>

    <h2>Add Employee</h2>

    <form [formGroup]="employeeForm"
          (ngSubmit)="onSubmit()">

        <div class="row">

            <div class="form-group">
                <label>First Name</label>
                <input type="text"
                       formControlName="firstName">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text"
                       formControlName="lastName">
            </div>

        </div>

        <div class="row">

            <div class="form-group">
                <label>Email</label>
                <input type="email"
                       formControlName="email">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text"
                       formControlName="phoneNumber">
            </div>

        </div>

        <div class="row">

            <div class="form-group">
                <label>Gender</label>

                <select formControlName="gender">
                    <option value="">Select</option>
                    <option>M</option>
                    <option>F</option>
                    <option>O</option>
                </select>

            </div>

            <div class="form-group">
                <label>DOB</label>
                <input type="date"
                       formControlName="dob">
            </div>

        </div>

        <div class="row">

            <div class="form-group">
                <label>DOJ</label>
                <input type="date"
                       formControlName="doj">
            </div>

            <div class="form-group">
                <label>Department</label>

                <select formControlName="departmentId">

                    <option value="">
                        Select Department
                    </option>

                    <option
                        *ngFor="let dept of departments"
                        [value]="dept.departmentId">

                        {{ dept.departmentName }}

                    </option>

                </select>

            </div>

        </div>

        <div class="row">

            <div class="form-group">
                <label>Role</label>

                <select formControlName="roleId">

                    <option value="">
                        Select Role
                    </option>

                    <option
                        *ngFor="let role of roles"
                        [value]="role.roleId">

                        {{ role.roleName }}

                    </option>

                    </select>

            </div>

            <div class="form-group">
                <label>Status</label>

                <select formControlName="status">
                    <option>Active</option>
                    <option>Inactive</option>
                </select>

            </div>

        </div>

        <button type="submit">
            Save Employee
        </button>

    </form>

</div>
