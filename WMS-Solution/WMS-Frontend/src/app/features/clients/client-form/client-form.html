<div class="form-wrapper">

  <div class="form-header">

    <button
      class="back-btn"
      (click)="goBack()">

      ← Back

    </button>

    <h2>Client Details</h2>

  </div>

  <form
    [formGroup]="clientForm"
    (ngSubmit)="onSubmit()">

    <div class="form-card">

      <div class="form-group">

        <label>Client Name</label>

        <input
          type="text"
          formControlName="clientName">

      </div>

      <div class="form-group">

        <label>Address</label>

        <input
          type="text"
          formControlName="clientAddress">

      </div>

      <div class="form-group">

        <label>Phone</label>

        <input
          type="text"
          formControlName="clientPhoneNumber">

      </div>

      <div class="form-group">

        <label>Location</label>

        <input
          type="text"
          formControlName="clientLocation">

      </div>

      <div class="form-group">

        <label>Status</label>

        <select
          formControlName="status">

          <option [ngValue]="true">
            Active
          </option>

          <option [ngValue]="false">
            Inactive
          </option>

        </select>

      </div>

      <button
        class="save-btn"
        type="submit">

        Save Client

      </button>

    </div>

  </form>

</div>
