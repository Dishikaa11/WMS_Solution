<div class="form-wrapper">

  <div class="form-header">

    <button
      class="back-btn"
      (click)="goBack()">

      ← Back

    </button>

    <h2>Add Department</h2>

  </div>

  <form
    [formGroup]="departmentForm"
    (ngSubmit)="onSubmit()">

    <div class="form-card">

      <div class="form-group">

        <label>
          Department Name
        </label>

        <input
          type="text"
          formControlName="departmentName"
          placeholder="Enter department name">

      </div>

      <div class="form-group">

        <label>
          Description
        </label>

        <textarea
          rows="5"
          formControlName="description"
          placeholder="Enter description">
        </textarea>

      </div>

      <div class="btn-row">

        <button
          type="submit"
          class="save-btn">

          Save Department

        </button>

      </div>

    </div>

  </form>

</div>
