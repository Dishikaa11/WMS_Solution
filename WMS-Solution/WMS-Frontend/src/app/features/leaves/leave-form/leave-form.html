<div class="form-wrapper">

  <div class="form-header">

    <button
    class="back-btn"
    (click)="goBack()">

    ← Back

    </button>

    <h2>Apply Leave</h2>

  </div>

  <form
  [formGroup]="leaveForm"
  (ngSubmit)="onSubmit()">

    <div class="form-card">

      <div class="form-group">
        <label>Employee ID</label>
        <input
        type="number"
        formControlName="empId">
      </div>

      <div class="form-group">
        <label>Leave Type</label>

        <select
        formControlName="leaveType">

          <option>
            Sick Leave
          </option>

          <option>
            Casual Leave
          </option>

          <option>
            Annual Leave
          </option>

        </select>

      </div>

      <div class="form-group">
        <label>From Date</label>

        <input
        type="date"
        formControlName="fromDate">
      </div>

      <div class="form-group">
        <label>To Date</label>

        <input
        type="date"
        formControlName="toDate">
      </div>

      <div class="form-group">
        <label>Reason</label>

        <textarea
        rows="4"
        formControlName="reason">
        </textarea>
      </div>

      <button
      class="save-btn">

      Submit Leave Request

      </button>

    </div>

  </form>

</div>
