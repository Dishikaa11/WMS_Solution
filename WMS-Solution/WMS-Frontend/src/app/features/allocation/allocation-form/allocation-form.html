<div class="form-wrapper">

  <div class="form-header">

    <button
      class="back-btn"
      (click)="goBack()">

      ← Back

    </button>

    <h2>

      {{isEditMode
      ? 'Edit Allocation'
      : 'Assign Employee'}}

    </h2>

  </div>

  <form
    [formGroup]="allocationForm"
    (ngSubmit)="onSubmit()">

    <div class="form-card">

      <div class="form-group">

        <label>
          Employee
        </label>

        <select
          formControlName="empId">

          <option value="">
            Select Employee
          </option>

          <option
          *ngFor="
          let emp of employees"
          [value]="emp.employeeId">

            {{emp.firstName}}
            {{emp.lastName}}

          </option>

        </select>

      </div>

      <div class="form-group">

        <label>
          Project
        </label>

        <select
          formControlName="projectId">

          <option value="">
            Select Project
          </option>

          <option
          *ngFor="
          let project of projects"
          [value]="project.projectId">

            {{project.projectName}}

          </option>

        </select>

      </div>

      <div class="form-group">

        <label>
          Assigned On
        </label>

        <input
          type="date"
          formControlName="assignedOn">

      </div>

      <div class="form-group">

        <label>
          Status
        </label>

        <select
          formControlName="status">

          <option>
            Active
          </option>

          <option>
            Completed
          </option>

        </select>

      </div>

      <div class="btn-row">

        <button
          type="submit"
          class="save-btn">

          Save Allocation

        </button>

      </div>

    </div>

  </form>

</div>
