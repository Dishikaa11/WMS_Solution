<div class="user-form-container">

  <div class="form-header">

    <div>
      <h1>User Login</h1>
      <p>Create and manage system users</p>
    </div>

    <button
      class="back-btn"
      (click)="goBack()">

      ← Back

    </button>

  </div>

  <form
    [formGroup]="userForm"
    (ngSubmit)="onSubmit()">

    <div class="form-card">

      <div class="form-grid">

        <div class="form-group">

          <label>Username</label>

          <input
            type="text"
            formControlName="username"
            placeholder="Enter username">

        </div>

        <div class="form-group">

          <label>Password</label>

          <input
            type="password"
            formControlName="passwordHash"
            placeholder="Enter password">

        </div>

        <div class="form-group">

          <label>Employee</label>

          <select
            formControlName="employeeId">

            <option value="">
              Select Employee
            </option>

            <option
              *ngFor="let emp of employees"
              [value]="emp.employeeId">

              {{ emp.firstName }}
              {{ emp.lastName }}

            </option>

          </select>

        </div>

        <div class="form-group">

          <label>Role</label>

          <select
            formControlName="roleId">

            <option value="">
              Select Role
            </option>

            <option
              *ngFor="let role of roles"
              [value]="role.roleId">

              {{ role.roleName }}

            </option>

          </select>

        </div>

      </div>

      <div class="btn-row">

        <button
          type="submit"
          class="save-btn">

          Save User

        </button>

      </div>

    </div>

  </form>

</div>
